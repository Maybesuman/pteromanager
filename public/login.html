<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pterodactyl Port Manager - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Pterodactyl</h1>
                <p class="subtitle">Port Manager</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-primary btn-login">Login</button>
            </form>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <div class="login-footer">
                <p class="default-credentials">
                    Demo credentials:<br>
                    <strong>admin</strong> / <strong>admin123</strong>
                </p>
            </div>
        </div>

        <div class="loading-spinner" id="loadingSpinner" style="display: none;">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        /**
         * Login form submission handler
         * Sends username and password to /auth/login endpoint
         */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const spinner = document.getElementById('loadingSpinner');

            // Clear previous messages
            errorDiv.textContent = '';
            successDiv.textContent = '';

            // Show loading spinner
            spinner.style.display = 'flex';

            try {
                // Send login request
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Login successful
                    successDiv.textContent = 'Login successful! Redirecting...';
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = data.redirect || '/dashboard.html';
                    }, 500);
                } else {
                    // Login failed
                    errorDiv.textContent = data.error || 'Login failed. Please try again.';
                    spinner.style.display = 'none';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'An error occurred. Please try again.';
                spinner.style.display = 'none';
            }
        });

        /**
         * Clear error message when user starts typing
         */
        document.getElementById('username').addEventListener('focus', () => {
            document.getElementById('errorMessage').textContent = '';
        });
        document.getElementById('password').addEventListener('focus', () => {
            document.getElementById('errorMessage').textContent = '';
        });

        /**
         * Check if user is already logged in
         */
        async function checkSession() {
            try {
                const response = await fetch('/auth/session');
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/dashboard.html';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }

        // Check session on page load
        checkSession();
    </script>
</body>
</html>
